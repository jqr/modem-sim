<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modem Handshake Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: #c0c0c0;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

header {
  padding: 12px 20px;
  border-bottom: 1px solid #333;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}

header h1 {
  font-size: 14px;
  color: #00ff41;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.controls {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

button {
  background: #1a1a1a;
  color: #00ff41;
  border: 1px solid #00ff41;
  padding: 6px 16px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
}

button:hover { background: #002200; }
button:disabled { opacity: 0.3; cursor: default; }
button.active { background: #003300; }

label {
  font-size: 11px;
  color: #888;
  display: flex;
  align-items: center;
  gap: 6px;
}

input[type="text"] {
  background: #111;
  color: #00ff41;
  border: 1px solid #333;
  padding: 4px 8px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  width: 120px;
}

input[type="range"] {
  width: 80px;
  accent-color: #00ff41;
}

select {
  background: #111;
  color: #00ff41;
  border: 1px solid #333;
  padding: 4px 8px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
}

.main {
  display: flex;
  flex: 1;
  min-height: 0;
}

.viz-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.viz-row {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid #222;
  min-height: 0;
  position: relative;
}

.viz-row:last-child { border-bottom: none; }

.viz-label {
  position: absolute;
  top: 4px;
  left: 8px;
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 1px;
  z-index: 1;
  pointer-events: none;
}

.viz-row canvas {
  width: 100%;
  height: 100%;
  display: block;
}

.info-panel {
  width: 280px;
  border-left: 1px solid #333;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow-y: auto;
  flex-shrink: 0;
}

.phase-display {
  border: 1px solid #333;
  padding: 10px;
  background: #0d0d0d;
}

.phase-display h3 {
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.phase-name {
  font-size: 16px;
  color: #00ff41;
  margin-bottom: 4px;
}

.phase-detail {
  font-size: 11px;
  color: #888;
  line-height: 1.5;
}

.phase-timeline {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.phase-step {
  font-size: 10px;
  padding: 3px 6px;
  color: #444;
  border-left: 2px solid #222;
}

.phase-step.active {
  color: #00ff41;
  border-left-color: #00ff41;
  background: #001a00;
}

.phase-step.done {
  color: #666;
  border-left-color: #444;
}

.stats {
  border: 1px solid #333;
  padding: 10px;
  background: #0d0d0d;
}

.stats h3 {
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  padding: 2px 0;
}

.stat-label { color: #666; }
.stat-value { color: #00ff41; }

.log {
  flex: 1;
  border: 1px solid #333;
  padding: 8px;
  background: #0d0d0d;
  overflow-y: auto;
  min-height: 100px;
}

.log h3 {
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.log-entry {
  font-size: 10px;
  color: #666;
  line-height: 1.6;
  white-space: nowrap;
}

.log-entry .time { color: #444; }
.log-entry .msg { color: #888; }
.log-entry.highlight .msg { color: #00ff41; }
</style>
</head>
<body>

<header>
  <h1>Modem Handshake Simulator</h1>
  <div class="controls">
    <button id="btn-dial" onclick="startHandshake()">Dial</button>
    <button id="btn-stop" onclick="stopHandshake()" disabled>Stop</button>
    <label>Number: <input type="text" id="phone-number" value="555-0147"></label>
    <label>Line Quality:
      <input type="range" id="line-quality" min="0" max="100" value="80">
      <span id="quality-display">80%</span>
    </label>
    <label>Protocol:
      <select id="protocol">
        <option value="v34">V.34 (33.6k)</option>
        <option value="v90">V.90 (56k)</option>
        <option value="v32">V.32bis (14.4k)</option>
        <option value="v22">V.22bis (2400)</option>
      </select>
    </label>
    <label>Volume:
      <input type="range" id="volume" min="0" max="100" value="60">
    </label>
  </div>
</header>

<div class="main">
  <div class="viz-panel">
    <div class="viz-row">
      <span class="viz-label">Waveform</span>
      <canvas id="waveform"></canvas>
    </div>
    <div class="viz-row">
      <span class="viz-label">Frequency Spectrum</span>
      <canvas id="spectrum"></canvas>
    </div>
    <div class="viz-row">
      <span class="viz-label">Spectrogram</span>
      <canvas id="spectrogram"></canvas>
    </div>
  </div>

  <div class="info-panel">
    <div class="phase-display">
      <h3>Current Phase</h3>
      <div class="phase-name" id="phase-name">Idle</div>
      <div class="phase-detail" id="phase-detail">Ready to dial</div>
    </div>

    <div class="phase-display">
      <h3>Handshake Sequence</h3>
      <div class="phase-timeline" id="phase-timeline"></div>
    </div>

    <div class="stats">
      <h3>Signal Stats</h3>
      <div class="stat-row">
        <span class="stat-label">Frequency</span>
        <span class="stat-value" id="stat-freq">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Level</span>
        <span class="stat-value" id="stat-level">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">SNR</span>
        <span class="stat-value" id="stat-snr">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Baud Rate</span>
        <span class="stat-value" id="stat-baud">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Connect Speed</span>
        <span class="stat-value" id="stat-speed">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Elapsed</span>
        <span class="stat-value" id="stat-elapsed">—</span>
      </div>
    </div>

    <div class="log">
      <h3>AT Log</h3>
      <div id="log-content"></div>
    </div>
  </div>
</div>

<script>

// ============================================================
// Audio Engine
// ============================================================

let audioCtx = null;
let masterGain = null;
let analyser = null;
let activeNodes = [];
let handshakeRunning = false;
let handshakeAbort = null;
let startTime = 0;
let animFrameId = null;

const FFT_SIZE = 2048;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new AudioContext({ sampleRate: 44100 });
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.6;
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = FFT_SIZE;
  analyser.smoothingTimeConstant = 0.6;
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);
}

function setVolume(v) {
  if (masterGain) masterGain.gain.value = v;
}

function getLineQuality() {
  return parseInt(document.getElementById('line-quality').value) / 100;
}

function stopAllNodes() {
  activeNodes.forEach(n => {
    try { n.stop(); } catch(e) {}
    try { n.disconnect(); } catch(e) {}
  });
  activeNodes = [];
}

// Create an oscillator connected to master output.
// Returns the oscillator node. Caller must call .start() and .stop().
function createOsc(freq, type = 'sine', gainVal = 0.3) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = gainVal;
  osc.connect(gain);
  gain.connect(masterGain);
  activeNodes.push(osc);
  osc._gainNode = gain;
  return osc;
}

// Create noise (white/pink) as an AudioBufferSourceNode
function createNoise(duration, gainVal = 0.1) {
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1);
  }
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const gain = audioCtx.createGain();
  gain.gain.value = gainVal;
  source.connect(gain);
  gain.connect(masterGain);
  activeNodes.push(source);
  source._gainNode = gain;
  return source;
}

// Bandpass-filtered noise
function createFilteredNoise(duration, freq, q, gainVal = 0.1) {
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1);
  }
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = freq;
  filter.Q.value = q;
  const gain = audioCtx.createGain();
  gain.gain.value = gainVal;
  source.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  activeNodes.push(source);
  source._gainNode = gain;
  source._filterNode = filter;
  return source;
}

// Telephone-band lowpass (3.4kHz cutoff) applied to line noise
function createLineNoise(gainVal) {
  const quality = getLineQuality();
  const noiseLevel = gainVal * (1 - quality * 0.8);
  const bufferSize = audioCtx.sampleRate * 30;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1);
  }
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.loop = true;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 3400;
  lp.Q.value = 0.7;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 300;
  hp.Q.value = 0.7;
  const gain = audioCtx.createGain();
  gain.gain.value = noiseLevel;
  source.connect(lp);
  lp.connect(hp);
  hp.connect(gain);
  gain.connect(masterGain);
  activeNodes.push(source);
  source._gainNode = gain;
  return source;
}

// ============================================================
// DTMF Tones
// ============================================================

const DTMF_FREQS = {
  '1': [697, 1209], '2': [697, 1336], '3': [697, 1477],
  '4': [770, 1209], '5': [770, 1336], '6': [770, 1477],
  '7': [852, 1209], '8': [852, 1336], '9': [852, 1477],
  '*': [941, 1209], '0': [941, 1336], '#': [941, 1477],
};

// ============================================================
// Handshake Phases
// ============================================================

const PHASES = [
  { id: 'pickup',    name: 'Off Hook',              detail: 'Taking phone off hook' },
  { id: 'dialtone',  name: 'Dial Tone',             detail: '350 Hz + 440 Hz continuous' },
  { id: 'dialing',   name: 'DTMF Dialing',          detail: 'Dual-tone multi-frequency digits' },
  { id: 'ringing',   name: 'Ringback',              detail: '440 Hz + 480 Hz, 2s on / 4s off' },
  { id: 'answer',    name: 'Answer Tone (CED)',      detail: '2100 Hz for 3.3s (V.25)' },
  { id: 'v8cm',      name: 'V.8 Originate (CM)',     detail: 'Calling menu signal' },
  { id: 'v8jm',      name: 'V.8 Answer (JM)',        detail: 'Joint menu acknowledgement' },
  { id: 'carrier',   name: 'Carrier Exchange',       detail: 'Initial carrier tones' },
  { id: 'probing',   name: 'Line Probing',           detail: 'Frequency sweeps to measure channel' },
  { id: 'training',  name: 'Equalizer Training',     detail: 'Scrambled training sequences' },
  { id: 'negotiate', name: 'Rate Negotiation',       detail: 'Agreeing on symbol rate & speed' },
  { id: 'connect',   name: 'Connected',              detail: 'Data mode established' },
];

function buildTimeline() {
  const container = document.getElementById('phase-timeline');
  container.innerHTML = '';
  PHASES.forEach(p => {
    const el = document.createElement('div');
    el.className = 'phase-step';
    el.id = 'step-' + p.id;
    el.textContent = p.name;
    container.appendChild(el);
  });
}

function setPhase(phaseId) {
  const phase = PHASES.find(p => p.id === phaseId);
  if (!phase) return;
  document.getElementById('phase-name').textContent = phase.name;
  document.getElementById('phase-detail').textContent = phase.detail;

  let found = false;
  PHASES.forEach(p => {
    const el = document.getElementById('step-' + p.id);
    if (p.id === phaseId) {
      el.className = 'phase-step active';
      found = true;
    } else if (!found) {
      el.className = 'phase-step done';
    } else {
      el.className = 'phase-step';
    }
  });
}

function setStat(id, val) {
  document.getElementById('stat-' + id).textContent = val;
}

function addLog(msg, highlight = false) {
  const container = document.getElementById('log-content');
  const el = document.createElement('div');
  el.className = 'log-entry' + (highlight ? ' highlight' : '');
  const elapsed = handshakeRunning ? ((audioCtx.currentTime - startTime) | 0) : 0;
  el.innerHTML = `<span class="time">[${elapsed}s]</span> <span class="msg">${msg}</span>`;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

// ============================================================
// Utility: sleep that respects abort
// ============================================================

function sleep(ms) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(resolve, ms);
    if (handshakeAbort) {
      const orig = handshakeAbort;
      handshakeAbort = () => { clearTimeout(timer); orig(); reject(new Error('abort')); };
    }
  });
}

// ============================================================
// Handshake Sequence
// ============================================================

async function runHandshake() {
  const phoneNumber = document.getElementById('phone-number').value.replace(/[^0-9*#]/g, '');
  const protocol = document.getElementById('protocol').value;
  const quality = getLineQuality();

  startTime = audioCtx.currentTime;

  // Start persistent line noise
  const lineNoise = createLineNoise(0.04);
  lineNoise.start();

  try {
    // Phase 1: Off Hook
    setPhase('pickup');
    addLog('ATZ');
    addLog('OK');
    await sleep(300);
    addLog(`ATD${phoneNumber}`);
    await sleep(200);

    // Phase 2: Dial Tone (~0.5s)
    setPhase('dialtone');
    setStat('freq', '350 + 440 Hz');
    const dt1 = createOsc(350, 'sine', 0.15);
    const dt2 = createOsc(440, 'sine', 0.15);
    dt1.start(); dt2.start();
    await sleep(800);
    dt1.stop(); dt2.stop();
    await sleep(80);

    // Phase 3: DTMF Dialing
    setPhase('dialing');
    for (const digit of phoneNumber) {
      const freqs = DTMF_FREQS[digit];
      if (!freqs) continue;
      setStat('freq', `${freqs[0]} + ${freqs[1]} Hz`);
      const o1 = createOsc(freqs[0], 'sine', 0.15);
      const o2 = createOsc(freqs[1], 'sine', 0.15);
      o1.start(); o2.start();
      await sleep(100);
      o1.stop(); o2.stop();
      await sleep(60);
    }
    addLog('Dialing complete');
    await sleep(400);

    // Phase 4: Ringback (1-2 rings)
    setPhase('ringing');
    setStat('freq', '440 + 480 Hz');
    const rings = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < rings; i++) {
      const r1 = createOsc(440, 'sine', 0.12);
      const r2 = createOsc(480, 'sine', 0.12);
      r1.start(); r2.start();
      await sleep(2000);
      r1.stop(); r2.stop();
      if (i < rings - 1) await sleep(4000);
    }
    addLog('Remote pickup detected');
    await sleep(300);

    // Phase 5: Answer Tone (CED) — 2100 Hz for ~3.3s
    setPhase('answer');
    setStat('freq', '2100 Hz');
    addLog('CED: 2100 Hz answer tone');
    const ced = createOsc(2100, 'sine', 0.25);
    ced.start();
    await sleep(3300);
    ced.stop();
    await sleep(200);

    // Phase 6: V.8 CM (Calling Menu)
    setPhase('v8cm');
    setStat('freq', 'V.8 CM modulated');
    addLog('V.8 CM signal');
    // CM signal: sequences of tones around 1800Hz with phase reversals
    const cm = createOsc(1800, 'sine', 0.2);
    cm.start();
    // Simulate phase reversals with rapid frequency shifts
    for (let i = 0; i < 6; i++) {
      cm.frequency.setValueAtTime(1800, audioCtx.currentTime);
      await sleep(50);
      cm.frequency.setValueAtTime(1200, audioCtx.currentTime);
      await sleep(50);
    }
    cm.stop();
    await sleep(150);

    // Phase 7: V.8 JM (Joint Menu)
    setPhase('v8jm');
    setStat('freq', 'V.8 JM modulated');
    addLog('V.8 JM response');
    const jm = createOsc(1600, 'sine', 0.2);
    jm.start();
    for (let i = 0; i < 6; i++) {
      jm.frequency.setValueAtTime(1600, audioCtx.currentTime);
      await sleep(50);
      jm.frequency.setValueAtTime(2000, audioCtx.currentTime);
      await sleep(50);
    }
    jm.stop();
    await sleep(200);

    // Phase 8: Carrier Exchange — the screech
    setPhase('carrier');
    setStat('freq', '1200 / 2400 Hz');
    addLog('Carrier exchange');
    const c1 = createOsc(1200, 'sine', 0.2);
    const c2 = createOsc(2400, 'sine', 0.15);
    const carrierNoise = createFilteredNoise(3, 1800, 2, 0.08);
    c1.start(); c2.start(); carrierNoise.start();
    await sleep(1500);
    // Frequency shifts as modems negotiate
    c1.frequency.linearRampToValueAtTime(1650, audioCtx.currentTime + 0.5);
    c2.frequency.linearRampToValueAtTime(1950, audioCtx.currentTime + 0.5);
    await sleep(1000);
    c1.stop(); c2.stop(); carrierNoise.stop();
    await sleep(200);

    // Phase 9: Line Probing — frequency sweeps
    setPhase('probing');
    setStat('freq', '150–3400 Hz sweep');
    addLog('Line probing (channel measurement)');
    const probe = createOsc(150, 'sine', 0.18);
    probe.start();
    // Sweep up through the phone band
    probe.frequency.exponentialRampToValueAtTime(3400, audioCtx.currentTime + 1.5);
    await sleep(1500);
    // Sweep back down
    probe.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 1.0);
    await sleep(1000);
    probe.stop();
    await sleep(100);

    // Second probe with multi-tone
    const probes = [600, 1200, 1800, 2400, 3000].map(f => createOsc(f, 'sine', 0.06));
    probes.forEach(p => p.start());
    await sleep(800);
    probes.forEach(p => p.stop());
    await sleep(200);

    // Phase 10: Equalizer Training — the "waterfall" scrambled sound
    setPhase('training');
    setStat('freq', 'Scrambled training');
    addLog('Equalizer training');
    const trainNoise = createFilteredNoise(4, 1800, 0.5, 0.15);
    const trainTone = createOsc(1800, 'sine', 0.1);
    trainNoise.start(); trainTone.start();
    // Modulate the center frequency to create the characteristic sound
    for (let i = 0; i < 20; i++) {
      const f = 1200 + Math.random() * 1200;
      trainTone.frequency.setValueAtTime(f, audioCtx.currentTime);
      await sleep(150);
    }
    trainNoise.stop(); trainTone.stop();
    await sleep(200);

    // Phase 11: Rate Negotiation
    setPhase('negotiate');
    addLog('Rate negotiation');
    const speedMap = {
      'v22': '2400', 'v32': '14400', 'v34': '33600', 'v90': '53333'
    };
    const baudMap = {
      'v22': '600', 'v32': '2400', 'v34': '3429', 'v90': '8000'
    };

    // Short burst of tones indicating agreement
    const neg1 = createOsc(1200, 'sine', 0.1);
    const neg2 = createOsc(2400, 'sine', 0.1);
    neg1.start(); neg2.start();
    await sleep(500);
    neg1.stop(); neg2.stop();
    await sleep(100);

    setStat('baud', baudMap[protocol] + ' baud');

    // Adjust final speed based on line quality
    let speed = parseInt(speedMap[protocol]);
    if (quality < 0.5) speed = Math.round(speed * 0.6);
    else if (quality < 0.8) speed = Math.round(speed * 0.85);
    setStat('speed', speed + ' bps');

    // Phase 12: Connected
    setPhase('connect');
    addLog(`CONNECT ${speed}`, true);
    addLog(`Protocol: ${protocol.toUpperCase()}`);
    setStat('snr', Math.round(20 + quality * 30) + ' dB');

    // Silence — just line noise remains
    await sleep(2000);

    // Gentle data sounds (very quiet modulated noise)
    const dataNoise = createFilteredNoise(60, 1800, 1, 0.02 * (1 - quality * 0.5));
    dataNoise.start();

  } catch (e) {
    if (e.message !== 'abort') throw e;
  }
}

// ============================================================
// Visualization
// ============================================================

let spectrogramData = null;
let spectrogramX = 0;

function initViz() {
  resizeCanvases();
  spectrogramData = null;
  spectrogramX = 0;
}

function resizeCanvases() {
  ['waveform', 'spectrum', 'spectrogram'].forEach(id => {
    const canvas = document.getElementById(id);
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * devicePixelRatio;
    canvas.height = rect.height * devicePixelRatio;
  });
}

function drawViz() {
  if (!analyser) return;
  animFrameId = requestAnimationFrame(drawViz);

  const bufLen = analyser.frequencyBinCount;
  const timeDomain = new Uint8Array(bufLen);
  const freqDomain = new Uint8Array(bufLen);
  analyser.getByteTimeDomainData(timeDomain);
  analyser.getByteFrequencyData(freqDomain);

  drawWaveform(timeDomain);
  drawSpectrum(freqDomain);
  drawSpectrogram(freqDomain);
  updateElapsed();
}

function drawWaveform(data) {
  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, w, h);

  // Grid lines
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  for (let y = 0; y < h; y += h / 8) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }

  // Waveform
  ctx.strokeStyle = '#00ff41';
  ctx.lineWidth = 1.5 * devicePixelRatio;
  ctx.beginPath();
  const sliceWidth = w / data.length;
  let x = 0;
  for (let i = 0; i < data.length; i++) {
    const v = data[i] / 128.0;
    const y = (v * h) / 2;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    x += sliceWidth;
  }
  ctx.stroke();

  // Glow effect
  ctx.strokeStyle = 'rgba(0, 255, 65, 0.3)';
  ctx.lineWidth = 4 * devicePixelRatio;
  ctx.beginPath();
  x = 0;
  for (let i = 0; i < data.length; i++) {
    const v = data[i] / 128.0;
    const y = (v * h) / 2;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    x += sliceWidth;
  }
  ctx.stroke();
}

function drawSpectrum(data) {
  const canvas = document.getElementById('spectrum');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, w, h);

  // Only show 0–8kHz (relevant for modem audio)
  const maxBin = Math.floor(8000 / (audioCtx.sampleRate / FFT_SIZE));
  const barCount = Math.min(maxBin, 200);
  const barWidth = w / barCount;

  for (let i = 0; i < barCount; i++) {
    const binIndex = Math.floor((i / barCount) * maxBin);
    const val = data[binIndex] / 255;
    const barHeight = val * h;

    const hue = 120; // green
    const lightness = 20 + val * 40;
    ctx.fillStyle = `hsl(${hue}, 100%, ${lightness}%)`;
    ctx.fillRect(i * barWidth, h - barHeight, barWidth - 1, barHeight);
  }

  // Frequency labels
  ctx.fillStyle = '#444';
  ctx.font = `${10 * devicePixelRatio}px Courier New`;
  [500, 1000, 2000, 3000, 4000, 6000, 8000].forEach(freq => {
    const x = (freq / 8000) * w;
    ctx.fillText(freq >= 1000 ? (freq/1000) + 'k' : freq + '', x, h - 4);
  });
}

function drawSpectrogram(data) {
  const canvas = document.getElementById('spectrogram');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  if (!spectrogramData || spectrogramData.width !== w || spectrogramData.height !== h) {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, w, h);
    spectrogramData = ctx.getImageData(0, 0, w, h);
    spectrogramX = 0;
  }

  // Only show 0–8kHz
  const maxBin = Math.floor(8000 / (audioCtx.sampleRate / FFT_SIZE));

  // Write one column
  for (let y = 0; y < h; y++) {
    const binIndex = Math.floor(((h - y) / h) * maxBin);
    const val = data[binIndex] / 255;

    // Color map: black -> dark green -> bright green -> yellow -> white
    let r, g, b;
    if (val < 0.25) {
      r = 0; g = Math.floor(val * 4 * 80); b = 0;
    } else if (val < 0.5) {
      r = 0; g = Math.floor(80 + (val - 0.25) * 4 * 175); b = 0;
    } else if (val < 0.75) {
      r = Math.floor((val - 0.5) * 4 * 255); g = 255; b = 0;
    } else {
      r = 255; g = 255; b = Math.floor((val - 0.75) * 4 * 255);
    }

    const idx = (y * w + spectrogramX) * 4;
    spectrogramData.data[idx] = r;
    spectrogramData.data[idx + 1] = g;
    spectrogramData.data[idx + 2] = b;
    spectrogramData.data[idx + 3] = 255;
  }

  ctx.putImageData(spectrogramData, 0, 0);

  // Draw playhead
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(spectrogramX, 0);
  ctx.lineTo(spectrogramX, h);
  ctx.stroke();

  spectrogramX = (spectrogramX + 1) % w;
}

function updateElapsed() {
  if (handshakeRunning) {
    const elapsed = audioCtx.currentTime - startTime;
    setStat('elapsed', elapsed.toFixed(1) + 's');
  }
}

// ============================================================
// Controls
// ============================================================

async function startHandshake() {
  initAudio();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  stopHandshake();

  handshakeRunning = true;
  document.getElementById('btn-dial').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  document.getElementById('log-content').innerHTML = '';

  setVolume(document.getElementById('volume').value / 100 * 0.8);
  buildTimeline();
  initViz();
  drawViz();

  let abortResolve;
  const abortPromise = new Promise((_, reject) => { abortResolve = reject; });
  handshakeAbort = () => abortResolve(new Error('abort'));

  try {
    await runHandshake();
  } catch (e) {
    if (e.message !== 'abort') console.error(e);
  }
}

function stopHandshake() {
  if (handshakeAbort) {
    try { handshakeAbort(); } catch(e) {}
  }
  handshakeAbort = null;
  handshakeRunning = false;
  stopAllNodes();
  document.getElementById('btn-dial').disabled = false;
  document.getElementById('btn-stop').disabled = true;

  if (animFrameId) {
    cancelAnimationFrame(animFrameId);
    animFrameId = null;
  }
}

// Volume slider
document.getElementById('volume').addEventListener('input', e => {
  setVolume(e.target.value / 100 * 0.8);
});

// Quality display
document.getElementById('line-quality').addEventListener('input', e => {
  document.getElementById('quality-display').textContent = e.target.value + '%';
});

// Resize handling
window.addEventListener('resize', () => {
  if (handshakeRunning) {
    spectrogramData = null;
    resizeCanvases();
  }
});

// Initial setup
buildTimeline();

</script>
