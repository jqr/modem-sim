<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modem Handshake Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: #c0c0c0;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

header {
  padding: 10px 20px;
  border-bottom: 1px solid #333;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}

header h1 {
  font-size: 14px;
  color: #00ff41;
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
}

.controls {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

button {
  background: #1a1a1a;
  color: #00ff41;
  border: 1px solid #00ff41;
  padding: 6px 16px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
}

button:hover { background: #002200; }
button:disabled { opacity: 0.3; cursor: default; }

label {
  font-size: 11px;
  color: #888;
  display: flex;
  align-items: center;
  gap: 6px;
}

input[type="text"] {
  background: #111;
  color: #00ff41;
  border: 1px solid #333;
  padding: 4px 8px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  width: 120px;
}

input[type="range"] { width: 80px; accent-color: #00ff41; }

select {
  background: #111;
  color: #00ff41;
  border: 1px solid #333;
  padding: 4px 8px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
}

.main {
  display: flex;
  flex: 1;
  min-height: 0;
}

.viz-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.viz-row {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid #222;
  min-height: 0;
  position: relative;
}

.viz-row:last-child { border-bottom: none; }

.viz-label {
  position: absolute;
  top: 4px;
  left: 8px;
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 1px;
  z-index: 1;
  pointer-events: none;
}

.viz-row canvas {
  width: 100%;
  height: 100%;
  display: block;
}

.info-panel {
  width: 280px;
  border-left: 1px solid #333;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
  flex-shrink: 0;
}

.phase-display {
  border: 1px solid #333;
  padding: 10px;
  background: #0d0d0d;
}

.phase-display h3 {
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.phase-name {
  font-size: 16px;
  color: #00ff41;
  margin-bottom: 4px;
}

.phase-detail {
  font-size: 11px;
  color: #888;
  line-height: 1.5;
}

.phase-timeline {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.phase-step {
  font-size: 10px;
  padding: 3px 6px;
  color: #444;
  border-left: 2px solid #222;
  cursor: pointer;
  transition: background 0.1s;
}

.phase-step.active {
  color: #00ff41;
  border-left-color: #00ff41;
  background: #001a00;
}

.phase-step.done {
  color: #666;
  border-left-color: #444;
}

.phase-step.hover {
  background: #1a1a00;
  color: #cccc66;
  border-left-color: #cccc66;
}

.stats {
  border: 1px solid #333;
  padding: 10px;
  background: #0d0d0d;
}

.stats h3 {
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  padding: 2px 0;
}

.stat-label { color: #666; }
.stat-value { color: #00ff41; }

.log {
  flex: 1;
  border: 1px solid #333;
  padding: 8px;
  background: #0d0d0d;
  overflow-y: auto;
  min-height: 80px;
}

.log h3 {
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.log-entry {
  font-size: 10px;
  color: #666;
  line-height: 1.6;
  white-space: nowrap;
}

.log-entry .time { color: #444; }
.log-entry .msg { color: #888; }
.log-entry.highlight .msg { color: #00ff41; }
</style>
</head>
<body>

<header>
  <h1>Modem Handshake Simulator</h1>
  <div class="controls">
    <button id="btn-dial" onclick="startHandshake()">Dial</button>
    <button id="btn-pause" onclick="togglePause()" disabled>Pause</button>
    <label>Number: <input type="text" id="phone-number" value="555-0147"></label>
    <label>Line Quality:
      <input type="range" id="line-quality" min="0" max="100" value="80">
      <span id="quality-display">80%</span>
    </label>
    <label>Protocol:
      <select id="protocol">
        <option value="v34">V.34 (33.6k)</option>
        <option value="v90">V.90 (56k)</option>
        <option value="v32">V.32bis (14.4k)</option>
        <option value="v22">V.22bis (2400)</option>
      </select>
    </label>
    <label>Volume:
      <input type="range" id="volume" min="0" max="100" value="60">
    </label>
  </div>
</header>

<div class="main">
  <div class="viz-panel">
    <div class="viz-row" style="flex: 1">
      <span class="viz-label">Waveform</span>
      <canvas id="waveform"></canvas>
    </div>
    <div class="viz-row" style="flex: 2">
      <span class="viz-label">Spectrogram</span>
      <canvas id="spectrogram"></canvas>
    </div>
  </div>

  <div class="info-panel">
    <div class="phase-display">
      <h3 id="phase-header">Current Phase</h3>
      <div class="phase-name" id="phase-name">Idle</div>
      <div class="phase-detail" id="phase-detail">Ready to dial</div>
    </div>

    <div class="phase-display">
      <h3>Handshake Sequence</h3>
      <div class="phase-timeline" id="phase-timeline"></div>
    </div>

    <div class="stats">
      <h3>Signal Stats</h3>
      <div class="stat-row">
        <span class="stat-label">Frequency</span>
        <span class="stat-value" id="stat-freq">&mdash;</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Level</span>
        <span class="stat-value" id="stat-level">&mdash;</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">SNR</span>
        <span class="stat-value" id="stat-snr">&mdash;</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Baud Rate</span>
        <span class="stat-value" id="stat-baud">&mdash;</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Connect Speed</span>
        <span class="stat-value" id="stat-speed">&mdash;</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Elapsed</span>
        <span class="stat-value" id="stat-elapsed">&mdash;</span>
      </div>
    </div>

    <div class="log">
      <h3>AT Log</h3>
      <div id="log-content"></div>
    </div>
  </div>
</div>

<script>

// ============================================================
// Audio Engine
// ============================================================

let audioCtx = null;
let masterGain = null;
let analyser = null;
let activeNodes = [];
let handshakeRunning = false;
let handshakeAbort = null;
let startTime = 0;
let animFrameId = null;
let currentPhaseId = null;
let hoveredPhaseId = null;
let paused = false;
let pauseResolve = null;
let skipBudget = 0;

const FFT_SIZE = 4096;
const SAMPLE_RATE = 44100;
const MAX_DISPLAY_FREQ = 5000;
const MS_PER_PIXEL = 1000 / 60;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE });

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.6;

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = FFT_SIZE;
  analyser.smoothingTimeConstant = 0.5;
  analyser.minDecibels = -100;
  analyser.maxDecibels = -10;

  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);
}

function setVolume(v) {
  if (masterGain) masterGain.gain.value = v;
}

function getLineQuality() {
  return parseInt(document.getElementById('line-quality').value) / 100;
}

function stopAllNodes() {
  activeNodes.forEach(n => {
    try { n.stop(); } catch(e) {}
    try { n.disconnect(); } catch(e) {}
  });
  activeNodes = [];
}

function trackNode(node) {
  activeNodes.push(node);
  return node;
}

// ============================================================
// Audio Primitives
// ============================================================

function createOsc(freq, type = 'sine', gainVal = 0.3) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = gainVal;
  osc.connect(gain);
  gain.connect(masterGain);
  trackNode(osc);
  osc._gainNode = gain;
  return osc;
}

function createNoiseBuffer(duration) {
  const len = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  return buffer;
}

function createFilteredNoise(duration, centerFreq, q, gainVal = 0.1) {
  const source = audioCtx.createBufferSource();
  source.buffer = createNoiseBuffer(duration);
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = centerFreq;
  filter.Q.value = q;
  const gain = audioCtx.createGain();
  gain.gain.value = gainVal;
  source.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  trackNode(source);
  source._gainNode = gain;
  source._filterNode = filter;
  return source;
}

// Telephone-band noise (300–3400 Hz) with level scaled by line quality
function createLineNoise(baseGain) {
  const quality = getLineQuality();
  const noiseLevel = baseGain * (1 - quality * 0.85);
  const source = audioCtx.createBufferSource();
  source.buffer = createNoiseBuffer(60);
  source.loop = true;

  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 3400;
  lp.Q.value = 0.7;

  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 300;
  hp.Q.value = 0.7;

  const gain = audioCtx.createGain();
  gain.gain.value = noiseLevel;

  source.connect(lp);
  lp.connect(hp);
  hp.connect(gain);
  gain.connect(masterGain);
  trackNode(source);
  source._gainNode = gain;
  return source;
}

// 60 Hz power hum with harmonics
function create60HzHum(gainVal) {
  const quality = getLineQuality();
  const level = gainVal * (1 - quality * 0.9);
  const oscs = [];
  [60, 120, 180].forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = f;
    gain.gain.value = level / (i + 1);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    trackNode(osc);
    oscs.push(osc);
  });
  return oscs;
}

// Impulse noise (crackle/pops) — generates a buffer with random spikes
function createImpulseNoise(duration, gainVal) {
  const quality = getLineQuality();
  const spikeRate = (1 - quality) * 15;
  const len = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < len; i++) {
    if (Math.random() < spikeRate / audioCtx.sampleRate) {
      const spikeLen = Math.floor(Math.random() * 80 + 20);
      const amp = (Math.random() * 0.5 + 0.5) * (Math.random() < 0.5 ? 1 : -1);
      for (let j = 0; j < spikeLen && i + j < len; j++) {
        data[i + j] = amp * Math.exp(-j / (spikeLen * 0.3));
      }
      i += spikeLen;
    }
  }

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.loop = true;
  const gain = audioCtx.createGain();
  gain.gain.value = gainVal;
  source.connect(gain);
  gain.connect(masterGain);
  trackNode(source);
  source._gainNode = gain;
  return source;
}

// ANSam tone: 2100 Hz with 15 Hz AM and phase reversals every 450ms (V.8 spec)
function createANSam(duration, gainVal = 0.25) {
  const len = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  const reversalInterval = Math.floor(0.45 * audioCtx.sampleRate);
  let phase = 0;
  let polarity = 1;
  const carrierInc = (2 * Math.PI * 2100) / audioCtx.sampleRate;
  const amInc = (2 * Math.PI * 15) / audioCtx.sampleRate;

  for (let i = 0; i < len; i++) {
    if (i > 0 && i % reversalInterval === 0) polarity *= -1;
    const am = 1 + 0.2 * Math.sin(amInc * i);
    data[i] = polarity * am * Math.sin(phase) * 0.8;
    phase += carrierInc;
  }

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const gain = audioCtx.createGain();
  gain.gain.value = gainVal;
  source.connect(gain);
  gain.connect(masterGain);
  trackNode(source);
  source._gainNode = gain;
  return source;
}

// V.21 FSK modulation (300 baud) — used for V.8 CM/JM signals
// mark=1650 Hz, space=1850 Hz for channel 2
function createV21FSK(bitPattern, markFreq, spaceFreq, baud, gainVal = 0.2) {
  const samplesPerBit = Math.floor(audioCtx.sampleRate / baud);
  const totalSamples = bitPattern.length * samplesPerBit;
  const buffer = audioCtx.createBuffer(1, totalSamples, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  let phase = 0;

  for (let b = 0; b < bitPattern.length; b++) {
    const freq = bitPattern[b] === 1 ? markFreq : spaceFreq;
    const inc = (2 * Math.PI * freq) / audioCtx.sampleRate;
    for (let s = 0; s < samplesPerBit; s++) {
      data[b * samplesPerBit + s] = Math.sin(phase);
      phase += inc;
    }
  }

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const gain = audioCtx.createGain();
  gain.gain.value = gainVal;
  source.connect(gain);
  gain.connect(masterGain);
  trackNode(source);
  source._gainNode = gain;
  return source;
}

// V.34 line probing: 21 tones at 150 Hz spacing (150–3300 Hz)
function createV34Probing(duration, gainVal = 0.15) {
  const len = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  const toneCount = 21;
  const perTone = gainVal / Math.sqrt(toneCount);

  for (let i = 0; i < len; i++) {
    let sample = 0;
    for (let t = 0; t < toneCount; t++) {
      const freq = 150 + t * 150;
      sample += Math.sin((2 * Math.PI * freq * i) / audioCtx.sampleRate);
    }
    // Fade in/out over 20ms
    const fadeLen = 0.02 * audioCtx.sampleRate;
    let envelope = 1;
    if (i < fadeLen) envelope = i / fadeLen;
    else if (i > len - fadeLen) envelope = (len - i) / fadeLen;

    data[i] = sample * perTone * envelope;
  }

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const gain = audioCtx.createGain();
  gain.gain.value = 1.0;
  source.connect(gain);
  gain.connect(masterGain);
  trackNode(source);
  source._gainNode = gain;
  return source;
}

// Scrambled PRBS training signal — band-limited noise shaped like QAM
function createTrainingSignal(duration, symbolRate, gainVal = 0.18) {
  const len = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  const samplesPerSymbol = audioCtx.sampleRate / symbolRate;
  const carrierFreq = 1800;
  const carrierInc = (2 * Math.PI * carrierFreq) / audioCtx.sampleRate;

  // PRBS-15 generator
  let lfsr = 0x7FFF;
  function nextBit() {
    const bit = ((lfsr >> 14) ^ (lfsr >> 13)) & 1;
    lfsr = ((lfsr << 1) | bit) & 0x7FFF;
    return bit;
  }

  let phase = 0;
  let symbolPhase = 0;
  let currentSymbolI = nextBit() * 2 - 1;
  let currentSymbolQ = nextBit() * 2 - 1;

  for (let i = 0; i < len; i++) {
    symbolPhase++;
    if (symbolPhase >= samplesPerSymbol) {
      symbolPhase = 0;
      currentSymbolI = nextBit() * 2 - 1;
      currentSymbolQ = nextBit() * 2 - 1;
    }
    // Raised-cosine pulse shape (simplified)
    const t = symbolPhase / samplesPerSymbol;
    const pulse = 0.5 * (1 - Math.cos(2 * Math.PI * t));

    data[i] = (currentSymbolI * Math.cos(phase) + currentSymbolQ * Math.sin(phase)) * pulse;
    phase += carrierInc;

    // Fade envelope
    const fadeLen = 0.03 * audioCtx.sampleRate;
    if (i < fadeLen) data[i] *= i / fadeLen;
    else if (i > len - fadeLen) data[i] *= (len - i) / fadeLen;
  }

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;

  // Bandpass to phone band
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 1800;
  bp.Q.value = 0.8;

  const gain = audioCtx.createGain();
  gain.gain.value = gainVal;
  source.connect(bp);
  bp.connect(gain);
  gain.connect(masterGain);
  trackNode(source);
  source._gainNode = gain;
  return source;
}

// ============================================================
// DTMF
// ============================================================

const DTMF_FREQS = {
  '1': [697, 1209], '2': [697, 1336], '3': [697, 1477],
  '4': [770, 1209], '5': [770, 1336], '6': [770, 1477],
  '7': [852, 1209], '8': [852, 1336], '9': [852, 1477],
  '*': [941, 1209], '0': [941, 1336], '#': [941, 1477],
};

// ============================================================
// Handshake Phases
// ============================================================

const PHASES = [
  { id: 'pickup',    name: 'Off Hook',                 detail: 'Taking phone off hook' },
  { id: 'dialtone',  name: 'Dial Tone',                detail: '350 Hz + 440 Hz continuous' },
  { id: 'dialing',   name: 'DTMF Dialing',             detail: 'Dual-tone multi-frequency digits' },
  { id: 'ringing',   name: 'Ringback',                 detail: '440 Hz + 480 Hz, 2s on / 4s off' },
  { id: 'answer',    name: 'ANSam Tone',               detail: '2100 Hz + 15 Hz AM, phase reversals every 450ms (V.8)' },
  { id: 'v8cm',      name: 'V.8 Originate (CM)',       detail: 'V.21 FSK, mark 1650 Hz / space 1850 Hz, 300 baud' },
  { id: 'v8jm',      name: 'V.8 Answer (JM)',          detail: 'V.21 FSK, mark 1850 Hz / space 1650 Hz, 300 baud' },
  { id: 'carrier',   name: 'Carrier Exchange',         detail: 'Initial carrier tones at 1200/2400 Hz' },
  { id: 'probing',   name: 'Line Probing (V.34 Ph.2)', detail: '21 tones at 150 Hz spacing, 150–3300 Hz' },
  { id: 'training',  name: 'Equalizer Training',       detail: 'Scrambled PRBS at symbol rate, QAM-shaped' },
  { id: 'negotiate', name: 'Rate Negotiation',         detail: 'Parameter exchange and final rate selection' },
  { id: 'connect',   name: 'Connected',                detail: 'Data mode established' },
];

function buildTimeline() {
  const container = document.getElementById('phase-timeline');
  container.innerHTML = '';
  PHASES.forEach(p => {
    const el = document.createElement('div');
    el.className = 'phase-step';
    el.id = 'step-' + p.id;
    el.textContent = p.name;
    el.addEventListener('mouseenter', () => setHoveredPhase(p.id));
    el.addEventListener('mouseleave', () => setHoveredPhase(null));
    el.addEventListener('click', () => simulateToPhase(p.id));
    container.appendChild(el);
  });
}

function setHoveredPhase(phaseId) {
  if (hoveredPhaseId === phaseId) return;
  if (hoveredPhaseId) {
    const old = document.getElementById('step-' + hoveredPhaseId);
    if (old) old.classList.remove('hover');
  }
  hoveredPhaseId = phaseId;
  if (hoveredPhaseId) {
    const el = document.getElementById('step-' + hoveredPhaseId);
    if (el) el.classList.add('hover');
    const phase = PHASES.find(p => p.id === phaseId);
    if (phase) {
      document.getElementById('phase-header').textContent = 'Highlighted Phase';
      document.getElementById('phase-name').textContent = phase.name;
      document.getElementById('phase-detail').textContent = phase.detail;
    }
  } else {
    document.getElementById('phase-header').textContent = 'Current Phase';
    const phase = PHASES.find(p => p.id === currentPhaseId);
    if (phase) {
      document.getElementById('phase-name').textContent = phase.name;
      document.getElementById('phase-detail').textContent = phase.detail;
    } else {
      document.getElementById('phase-name').textContent = 'Idle';
      document.getElementById('phase-detail').textContent = 'Ready to dial';
    }
  }
  if (!animFrameId) renderSpectrogramStatic();
}

function getPhaseXRange(phaseId) {
  if (!phaseMarkers.length) return null;
  for (let i = 0; i < phaseMarkers.length; i++) {
    if (phaseMarkers[i].id === phaseId) {
      const startX = phaseMarkers[i].x;
      const endX = (i + 1 < phaseMarkers.length) ? phaseMarkers[i + 1].x : spectrogramX;
      return { startX, endX };
    }
  }
  return null;
}

function getPhaseAtX(x) {
  for (let i = phaseMarkers.length - 1; i >= 0; i--) {
    if (x >= phaseMarkers[i].x) return phaseMarkers[i].id;
  }
  return null;
}

function setPhase(phaseId) {
  currentPhaseId = phaseId;
  const phase = PHASES.find(p => p.id === phaseId);
  if (!phase) return;
  if (!hoveredPhaseId) {
    document.getElementById('phase-name').textContent = phase.name;
    document.getElementById('phase-detail').textContent = phase.detail;
  }

  let found = false;
  PHASES.forEach(p => {
    const el = document.getElementById('step-' + p.id);
    if (p.id === phaseId) {
      el.className = 'phase-step active';
      found = true;
    } else if (!found) {
      el.className = 'phase-step done';
    } else {
      el.className = 'phase-step';
    }
  });
}

function setStat(id, val) {
  document.getElementById('stat-' + id).textContent = val;
}

function addLog(msg, highlight = false) {
  const container = document.getElementById('log-content');
  const el = document.createElement('div');
  el.className = 'log-entry' + (highlight ? ' highlight' : '');
  const elapsed = handshakeRunning ? ((audioCtx.currentTime - startTime) | 0) : 0;
  el.innerHTML = `<span class="time">[${elapsed}s]</span> <span class="msg">${msg}</span>`;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

// ============================================================
// Sleep (abort-aware)
// ============================================================

function waitIfPaused() {
  if (!paused) return Promise.resolve();
  return new Promise(resolve => { pauseResolve = resolve; });
}

function advanceSpectrogramSkip(pixels) {
  if (!spectrogramImageData) return;
  const plotW = spectrogramImageData.width;
  spectrogramX = (spectrogramX + pixels) % plotW;
  if (spectrogramX > spectrogramMaxX) spectrogramMaxX = spectrogramX;
}

function sleep(ms) {
  return waitIfPaused().then(() => {
    if (skipBudget > 0) {
      const skip = Math.min(skipBudget, ms);
      skipBudget -= skip;
      ms -= skip;
      advanceSpectrogramSkip(Math.round(skip / MS_PER_PIXEL));
      if (ms <= 0) return;
    }
    return new Promise((resolve, reject) => {
      const timer = setTimeout(resolve, ms);
      if (handshakeAbort) {
        const orig = handshakeAbort;
        handshakeAbort = () => { clearTimeout(timer); orig(); reject(new Error('abort')); };
      }
    });
  });
}

// ============================================================
// Handshake Sequence
// ============================================================

async function runHandshake(startPhaseId = null, skipToPhaseId = null) {
  const phoneNumber = document.getElementById('phone-number').value.replace(/[^0-9*#]/g, '');
  const protocol = document.getElementById('protocol').value;
  const quality = getLineQuality();

  startTime = audioCtx.currentTime;

  // Persistent line impairments
  const lineNoise = createLineNoise(0.05);
  lineNoise.start();
  const humOscs = create60HzHum(0.015);
  const impulseNoise = createImpulseNoise(60, 0.06);
  impulseNoise.start();

  const phases = [
    { id: 'pickup', run: async () => {
      addLog('ATZ');
      addLog('OK');
      await sleep(300);
      addLog(`ATD${phoneNumber}`);
      await sleep(200);
    }},

    { id: 'dialtone', run: async () => {
      setStat('freq', '350 + 440 Hz');
      setStat('level', '-13 dBm');
      const dt1 = createOsc(350, 'sine', 0.15);
      const dt2 = createOsc(440, 'sine', 0.15);
      dt1.start(); dt2.start();
      await sleep(900);
      dt1.stop(); dt2.stop();
      await sleep(60);
    }},

    { id: 'dialing', run: async () => {
      for (const digit of phoneNumber) {
        const freqs = DTMF_FREQS[digit];
        if (!freqs) continue;
        setStat('freq', `${freqs[0]} + ${freqs[1]} Hz`);
        const o1 = createOsc(freqs[0], 'sine', 0.14);
        const o2 = createOsc(freqs[1], 'sine', 0.14);
        o1.start(); o2.start();
        await sleep(70);
        o1.stop(); o2.stop();
        await sleep(70);
      }
      addLog('Dialing complete');
      await sleep(500);
    }},

    { id: 'ringing', run: async () => {
      setStat('freq', '440 + 480 Hz');
      setStat('level', '-19 dBm');
      const rings = 1 + Math.floor(Math.random() * 2);
      for (let i = 0; i < rings; i++) {
        const r1 = createOsc(440, 'sine', 0.1);
        const r2 = createOsc(480, 'sine', 0.1);
        r1.start(); r2.start();
        await sleep(2000);
        r1.stop(); r2.stop();
        if (i < rings - 1) await sleep(4000);
      }
      addLog('Remote pickup');
      await sleep(300);
    }},

    { id: 'answer', run: async () => {
      setStat('freq', '2100 Hz (AM 15 Hz)');
      setStat('level', '-12 dBm');
      addLog('ANSam: 2100 Hz + 15 Hz AM');
      addLog('Phase reversals @ 450ms');
      const ansam = createANSam(3.3, 0.22);
      ansam.start();
      await sleep(3300);
      ansam.stop();
      await sleep(200);
    }},

    { id: 'v8cm', run: async () => {
      setStat('freq', '1650/1850 Hz FSK');
      setStat('level', '-10 dBm');
      addLog('V.8 CM: calling menu');
      const cmBits = [];
      for (let i = 0; i < 30; i++) cmBits.push(i % 2);
      for (let i = 0; i < 24; i++) cmBits.push(Math.round(Math.random()));
      const cm = createV21FSK(cmBits, 1650, 1850, 300, 0.2);
      cm.start();
      await sleep(cmBits.length / 300 * 1000);
      cm.stop();
      await sleep(100);
    }},

    { id: 'v8jm', run: async () => {
      setStat('freq', '1850/1650 Hz FSK');
      addLog('V.8 JM: joint menu ack');
      const jmBits = [];
      for (let i = 0; i < 20; i++) jmBits.push(i % 2);
      for (let i = 0; i < 16; i++) jmBits.push(Math.round(Math.random()));
      const jm = createV21FSK(jmBits, 1850, 1650, 300, 0.2);
      jm.start();
      await sleep(jmBits.length / 300 * 1000);
      jm.stop();
      await sleep(200);
    }},

    { id: 'carrier', run: async () => {
      setStat('freq', '1200 / 2400 Hz');
      setStat('level', '-10 dBm');
      addLog('Carrier exchange');
      const c1 = createOsc(1200, 'sine', 0.18);
      const c2 = createOsc(2400, 'sine', 0.14);
      const carrierNoise = createFilteredNoise(3, 1800, 1.5, 0.06);
      c1.start(); c2.start(); carrierNoise.start();
      await sleep(1200);
      c1.frequency.linearRampToValueAtTime(1600, audioCtx.currentTime + 0.8);
      c2.frequency.linearRampToValueAtTime(2000, audioCtx.currentTime + 0.8);
      await sleep(1200);
      c1.stop(); c2.stop(); carrierNoise.stop();
      await sleep(150);
    }},

    { id: 'probing', run: async () => {
      setStat('freq', '150–3300 Hz (21 tones)');
      addLog('L1 probe: 21 tones (150 Hz spacing)');
      const l1 = createV34Probing(1.0, 0.14);
      l1.start();
      await sleep(1000);
      l1.stop();
      await sleep(100);
      addLog('L2 probe: reverse direction');
      const l2 = createV34Probing(1.0, 0.14);
      l2.start();
      await sleep(1000);
      l2.stop();
      await sleep(100);
      addLog('Band-edge probing');
      for (const freq of [300, 3300]) {
        const probe = createOsc(freq, 'sine', 0.12);
        probe.start();
        await sleep(300);
        probe.stop();
        await sleep(50);
      }
      await sleep(100);
    }},

    { id: 'training', run: async () => {
      const symbolRates = { 'v22': 600, 'v32': 2400, 'v34': 3429, 'v90': 8000 };
      const symRate = symbolRates[protocol];
      setStat('freq', `PRBS @ ${symRate} baud`);
      setStat('baud', symRate + ' baud');
      addLog(`Training: ${symRate} baud PRBS-15`);
      addLog('QAM constellation mapping');
      const train1 = createTrainingSignal(2.5, symRate, 0.16);
      train1.start();
      await sleep(2500);
      train1.stop();
      await sleep(100);
      addLog('Reverse training');
      const train2 = createTrainingSignal(2.0, symRate, 0.14);
      train2.start();
      await sleep(2000);
      train2.stop();
      await sleep(200);
    }},

    { id: 'negotiate', run: async () => {
      addLog('Rate negotiation');
      const speedMap = { 'v22': 2400, 'v32': 14400, 'v34': 33600, 'v90': 53333 };
      const neg1 = createOsc(1200, 'sine', 0.08);
      const neg2 = createOsc(2400, 'sine', 0.06);
      neg1.start(); neg2.start();
      await sleep(400);
      neg1.stop(); neg2.stop();
      await sleep(80);
      let speed = speedMap[protocol];
      if (quality < 0.3) speed = Math.round(speed * 0.5);
      else if (quality < 0.6) speed = Math.round(speed * 0.75);
      else if (quality < 0.85) speed = Math.round(speed * 0.9);
      setStat('speed', speed + ' bps');
      setStat('snr', Math.round(15 + quality * 35) + ' dB');
    }},

    { id: 'connect', run: async () => {
      const speedMap = { 'v22': 2400, 'v32': 14400, 'v34': 33600, 'v90': 53333 };
      let speed = speedMap[protocol];
      if (quality < 0.3) speed = Math.round(speed * 0.5);
      else if (quality < 0.6) speed = Math.round(speed * 0.75);
      else if (quality < 0.85) speed = Math.round(speed * 0.9);
      addLog(`CONNECT ${speed}`, true);
      addLog(`Protocol: ${protocol.toUpperCase()}`);
      addLog(`SNR: ${Math.round(15 + quality * 35)} dB`);
      await sleep(300);
      stopHandshake();
    }},
  ];

  const startIdx = startPhaseId ? phases.findIndex(p => p.id === startPhaseId) : 0;

  try {
    for (let i = Math.max(0, startIdx); i < phases.length; i++) {
      if (skipToPhaseId && phases[i].id === skipToPhaseId) {
        skipBudget = 0;
        stopAllNodes();
      }
      setPhase(phases[i].id);
      await phases[i].run();
    }
  } catch (e) {
    if (e.message !== 'abort') throw e;
  }
}

function jumpToPhase(phaseId, exactX = null) {
  if (!spectrogramImageData) return;

  // Determine target X and skip budget
  let targetX;
  const range = getPhaseXRange(phaseId);
  if (!range) return;

  if (exactX != null) {
    targetX = Math.max(0, Math.round(exactX));
  } else {
    targetX = range.startX;
  }

  // Don't allow jumping past the furthest point reached
  if (targetX > spectrogramMaxX) return;

  // Calculate how far into the phase to fast-forward
  const pixelOffset = Math.max(0, targetX - range.startX);
  skipBudget = pixelOffset * MS_PER_PIXEL;

  // Unpause if needed
  if (paused) {
    paused = false;
    if (pauseResolve) { pauseResolve(); pauseResolve = null; }
    setVolume(document.getElementById('volume').value / 100 * 0.8);
  }

  // Abort current handshake without clearing viz
  if (handshakeAbort) {
    try { handshakeAbort(); } catch(e) {}
  }
  handshakeAbort = null;
  stopAllNodes();

  spectrogramX = targetX;

  // Trim markers so the replayed phases re-record from this point
  const idx = phaseMarkers.findIndex(m => m.id === phaseId);
  if (idx >= 0) phaseMarkers = phaseMarkers.slice(0, idx);

  // Restart
  handshakeRunning = true;
  handshakeAbort = () => {};
  document.getElementById('btn-dial').textContent = 'Redial';
  document.getElementById('btn-pause').disabled = false;
  document.getElementById('btn-pause').textContent = 'Pause';

  if (!animFrameId) drawViz();

  runHandshake(phaseId).catch(e => {
    if (e.message !== 'abort') console.error(e);
  });
}

async function simulateToPhase(phaseId) {
  initAudio();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  if (paused) {
    paused = false;
    if (pauseResolve) { pauseResolve(); pauseResolve = null; }
  }
  if (handshakeAbort) {
    try { handshakeAbort(); } catch(e) {}
  }
  handshakeAbort = null;
  stopAllNodes();

  buildTimeline();
  spectrogramX = 0;
  spectrogramMaxX = 0;
  phaseMarkers = [];
  peakHold = null;
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  if (!spectrogramImageData) resizeCanvases();

  handshakeRunning = true;
  skipBudget = Infinity;
  setVolume(document.getElementById('volume').value / 100 * 0.8);
  document.getElementById('btn-dial').textContent = 'Redial';
  document.getElementById('btn-pause').disabled = false;
  document.getElementById('btn-pause').textContent = 'Pause';
  document.getElementById('log-content').innerHTML = '';

  handshakeAbort = () => {};
  drawViz();

  try {
    await runHandshake(null, phaseId);
  } catch (e) {
    if (e.message !== 'abort') console.error(e);
  }
}

// ============================================================
// Visualization
// ============================================================

let spectrogramImageData = null;
let spectrogramX = 0;
let spectrogramMaxX = 0;
let peakHold = null;
let peakDecay = 0.995;
let phaseMarkers = [];
let lastFreqData = null;

function initViz() {
  resizeCanvases();
  spectrogramImageData = null;
  spectrogramX = 0;
  spectrogramMaxX = 0;
  peakHold = null;
  phaseMarkers = [];
}

function resizeCanvases() {
  ['waveform', 'spectrogram'].forEach(id => {
    const canvas = document.getElementById(id);
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = Math.floor(rect.width * devicePixelRatio);
    canvas.height = Math.floor(rect.height * devicePixelRatio);
  });
}

function drawViz() {
  if (!analyser) return;
  animFrameId = requestAnimationFrame(drawViz);

  const bufLen = analyser.frequencyBinCount;
  const timeDomain = new Uint8Array(bufLen);
  const freqDomain = new Uint8Array(bufLen);
  analyser.getByteTimeDomainData(timeDomain);
  analyser.getByteFrequencyData(freqDomain);

  lastFreqData = freqDomain;
  drawWaveform(timeDomain);

  if (handshakeRunning && !paused) {
    drawSpectrogram(freqDomain);
  } else {
    renderSpectrogramStatic();
  }

  updateStats(freqDomain, timeDomain);
}

function drawWaveform(data) {
  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const dpr = devicePixelRatio;

  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, w, h);

  // Horizontal grid
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  for (let i = 1; i < 8; i++) {
    const y = (i / 8) * h;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }

  // Center line
  ctx.strokeStyle = '#2a2a2a';
  ctx.beginPath(); ctx.moveTo(0, h / 2); ctx.lineTo(w, h / 2); ctx.stroke();

  // dB scale labels on left
  ctx.fillStyle = '#333';
  ctx.font = `${9 * dpr}px Courier New`;
  ctx.textAlign = 'left';
  ctx.fillText('  0', 4 * dpr, h * 0.125 + 3 * dpr);
  ctx.fillText(' -6', 4 * dpr, h * 0.25 + 3 * dpr);
  ctx.fillText('-12', 4 * dpr, h * 0.375 + 3 * dpr);

  // Glow layer
  ctx.strokeStyle = 'rgba(0, 255, 65, 0.15)';
  ctx.lineWidth = 5 * dpr;
  ctx.beginPath();
  const sliceWidth = w / data.length;
  let x = 0;
  for (let i = 0; i < data.length; i++) {
    const v = data[i] / 128.0;
    const y = (v * h) / 2;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    x += sliceWidth;
  }
  ctx.stroke();

  // Waveform line
  ctx.strokeStyle = '#00ff41';
  ctx.lineWidth = 1.5 * dpr;
  ctx.beginPath();
  x = 0;
  for (let i = 0; i < data.length; i++) {
    const v = data[i] / 128.0;
    const y = (v * h) / 2;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    x += sliceWidth;
  }
  ctx.stroke();
}

function drawSpectrogram(data) {
  const canvas = document.getElementById('spectrogram');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const dpr = devicePixelRatio;
  const marginLeft = 35 * dpr;
  const plotW = w - marginLeft;
  const plotH = h - 16 * dpr;

  if (!spectrogramImageData || spectrogramImageData.width !== plotW || spectrogramImageData.height !== plotH) {
    spectrogramImageData = ctx.createImageData(plotW, plotH);
    for (let i = 3; i < spectrogramImageData.data.length; i += 4) {
      spectrogramImageData.data[i] = 255;
    }
    spectrogramX = 0;
    phaseMarkers = [];
    // Redraw axis background
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, w, h);
  }

  const maxBin = Math.floor(MAX_DISPLAY_FREQ / (audioCtx.sampleRate / FFT_SIZE));

  // Track phase changes for markers
  if (phaseMarkers.length === 0 || phaseMarkers[phaseMarkers.length - 1].id !== currentPhaseId) {
    phaseMarkers.push({ id: currentPhaseId, x: spectrogramX });
  }

  // Write one column
  for (let y = 0; y < plotH; y++) {
    const binIndex = Math.floor(((plotH - y) / plotH) * maxBin);
    const val = data[binIndex] / 255;

    let r, g, b;
    if (val < 0.15) {
      r = 0; g = Math.floor(val / 0.15 * 40); b = Math.floor(val / 0.15 * 20);
    } else if (val < 0.35) {
      const t = (val - 0.15) / 0.2;
      r = 0; g = Math.floor(40 + t * 160); b = Math.floor(20 - t * 20);
    } else if (val < 0.6) {
      const t = (val - 0.35) / 0.25;
      r = Math.floor(t * 200); g = Math.floor(200 + t * 55); b = 0;
    } else if (val < 0.8) {
      const t = (val - 0.6) / 0.2;
      r = Math.floor(200 + t * 55); g = 255; b = Math.floor(t * 100);
    } else {
      const t = (val - 0.8) / 0.2;
      r = 255; g = 255; b = Math.floor(100 + t * 155);
    }

    const idx = (y * plotW + spectrogramX) * 4;
    spectrogramImageData.data[idx] = r;
    spectrogramImageData.data[idx + 1] = g;
    spectrogramImageData.data[idx + 2] = b;
  }

  // Draw spectrogram image
  ctx.putImageData(spectrogramImageData, marginLeft, 0);

  renderSpectrogramOverlays(ctx, w, h, marginLeft, plotW, plotH, dpr, data);

  spectrogramX = (spectrogramX + 1) % plotW;
  if (spectrogramX > spectrogramMaxX) spectrogramMaxX = spectrogramX;
}

function renderSpectrogramOverlays(ctx, w, h, marginLeft, plotW, plotH, dpr, freqData) {
  const maxBin = audioCtx ? Math.floor(MAX_DISPLAY_FREQ / (audioCtx.sampleRate / FFT_SIZE)) : 0;
  const spectrumWidth = 120 * dpr;

  // Phone band markers (300–3400 Hz) as horizontal dashed lines
  ctx.strokeStyle = 'rgba(255, 100, 0, 0.15)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  [300, 3400].forEach(freq => {
    const y = plotH * (1 - freq / MAX_DISPLAY_FREQ);
    ctx.beginPath(); ctx.moveTo(marginLeft, y); ctx.lineTo(w, y); ctx.stroke();
  });
  ctx.setLineDash([]);

  // Live spectrum overlay anchored to playhead (only at the frontier)
  const atFrontier = spectrogramX >= spectrogramMaxX - 1;
  if (freqData && maxBin > 0 && atFrontier) {
    if (!peakHold || peakHold.length !== maxBin) {
      peakHold = new Float32Array(maxBin);
    }

    const baseX = marginLeft + spectrogramX;
    const barStep = 2;
    const barH = Math.max(1, plotH / maxBin * barStep - 1);

    ctx.save();
    ctx.beginPath();
    ctx.rect(marginLeft, 0, plotW, plotH);
    ctx.clip();

    for (let i = 0; i < maxBin; i += barStep) {
      const val = freqData[i] / 255;
      const y = plotH * (1 - i / maxBin) - barH;
      const barW = val * spectrumWidth;

      if (barW > 0.5) {
        const lightness = 20 + val * 40;
        ctx.fillStyle = `hsla(120, 100%, ${lightness}%, 0.5)`;
        ctx.fillRect(baseX, y, barW, barH);
      }
    }

    ctx.restore();
  }

  // Hover highlight overlay
  if (hoveredPhaseId) {
    const range = getPhaseXRange(hoveredPhaseId);
    if (range) {
      const x1 = marginLeft + range.startX;
      const x2 = marginLeft + range.endX;
      if (x2 > x1) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
        ctx.fillRect(marginLeft, 0, range.startX, plotH);
        ctx.fillRect(x2, 0, plotW - range.endX, plotH);
        ctx.strokeStyle = 'rgba(204, 204, 102, 0.7)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x1, 0); ctx.lineTo(x1, plotH); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x2, 0); ctx.lineTo(x2, plotH); ctx.stroke();
      }
    }
  }

  // Phase marker labels
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(marginLeft, plotH, plotW, 16 * dpr);
  ctx.font = `${8 * dpr}px Courier New`;
  ctx.textAlign = 'left';
  for (let i = 0; i < phaseMarkers.length; i++) {
    const m = phaseMarkers[i];
    const x = marginLeft + m.x;
    const isHovered = hoveredPhaseId === m.id;
    ctx.strokeStyle = isHovered ? 'rgba(204, 204, 102, 0.9)' : 'rgba(255, 255, 255, 0.4)';
    ctx.lineWidth = isHovered ? 2 : 1;
    ctx.beginPath(); ctx.moveTo(x, plotH); ctx.lineTo(x, plotH + 4 * dpr); ctx.stroke();
    const phase = PHASES.find(p => p.id === m.id);
    if (phase) {
      const maxLabelW = (i < phaseMarkers.length - 1)
        ? (phaseMarkers[i + 1].x - m.x)
        : (plotW - m.x);
      if (maxLabelW > 20 * dpr) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(x + 2, plotH, maxLabelW - 4, 16 * dpr);
        ctx.clip();
        ctx.fillStyle = isHovered ? '#cccc66' : '#999';
        ctx.fillText(phase.name, x + 3 * dpr, plotH + 11 * dpr);
        ctx.restore();
      }
    }
  }

  // Playhead
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(marginLeft + spectrogramX, 0);
  ctx.lineTo(marginLeft + spectrogramX, plotH);
  ctx.stroke();

  // Frequency axis (left margin)
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, marginLeft, h);
  ctx.fillStyle = '#444';
  ctx.font = `${9 * dpr}px Courier New`;
  ctx.textAlign = 'right';
  const freqTicks = [300, 1000, 2000, 3000, 4000, 5000];
  for (const freq of freqTicks) {
    if (freq > MAX_DISPLAY_FREQ) break;
    const y = plotH * (1 - freq / MAX_DISPLAY_FREQ);
    ctx.fillText(freq >= 1000 ? (freq / 1000) + 'k' : '' + freq, marginLeft - 4 * dpr, y + 3 * dpr);
    ctx.strokeStyle = '#1a1a1a';
    ctx.beginPath(); ctx.moveTo(marginLeft - 2, y); ctx.lineTo(marginLeft, y); ctx.stroke();
  }
}

function renderSpectrogramStatic() {
  if (!spectrogramImageData) return;
  const canvas = document.getElementById('spectrogram');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const dpr = devicePixelRatio;
  const marginLeft = 35 * dpr;
  const plotW = w - marginLeft;
  const plotH = h - 16 * dpr;

  ctx.putImageData(spectrogramImageData, marginLeft, 0);
  renderSpectrogramOverlays(ctx, w, h, marginLeft, plotW, plotH, dpr, lastFreqData);
}

function updateStats(freqData, timeData) {
  if (!handshakeRunning) return;

  const elapsed = audioCtx.currentTime - startTime;
  setStat('elapsed', elapsed.toFixed(1) + 's');

  // RMS level
  let sumSq = 0;
  for (let i = 0; i < timeData.length; i++) {
    const v = (timeData[i] - 128) / 128;
    sumSq += v * v;
  }
  const rms = Math.sqrt(sumSq / timeData.length);
  const dbLevel = rms > 0 ? (20 * Math.log10(rms)).toFixed(1) : '-inf';
  setStat('level', dbLevel + ' dB');
}

// ============================================================
// Controls
// ============================================================

async function startHandshake() {
  initAudio();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  stopHandshake();

  handshakeRunning = true;
  paused = false;
  skipBudget = 0;
  document.getElementById('btn-dial').textContent = 'Redial';
  document.getElementById('btn-pause').disabled = false;
  document.getElementById('btn-pause').textContent = 'Pause';
  document.getElementById('log-content').innerHTML = '';

  setVolume(document.getElementById('volume').value / 100 * 0.8);
  buildTimeline();
  initViz();
  if (animFrameId) {
    cancelAnimationFrame(animFrameId);
    animFrameId = null;
  }
  drawViz();

  handshakeAbort = () => {};

  try {
    await runHandshake();
  } catch (e) {
    if (e.message !== 'abort') console.error(e);
  }
}

function togglePause() {
  if (!handshakeRunning) return;
  paused = !paused;
  document.getElementById('btn-pause').textContent = paused ? 'Resume' : 'Pause';
  if (paused) {
    masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  } else {
    setVolume(document.getElementById('volume').value / 100 * 0.8);
    if (pauseResolve) {
      pauseResolve();
      pauseResolve = null;
    }
  }
}

function stopHandshake() {
  if (paused) {
    paused = false;
    if (pauseResolve) { pauseResolve(); pauseResolve = null; }
  }
  if (handshakeAbort) {
    try { handshakeAbort(); } catch(e) {}
  }
  handshakeAbort = null;
  handshakeRunning = false;
  stopAllNodes();
  document.getElementById('btn-pause').disabled = true;
  document.getElementById('btn-pause').textContent = 'Pause';
}

document.getElementById('volume').addEventListener('input', e => {
  setVolume(e.target.value / 100 * 0.8);
});

document.getElementById('line-quality').addEventListener('input', e => {
  document.getElementById('quality-display').textContent = e.target.value + '%';
});

window.addEventListener('resize', () => {
  spectrogramImageData = null;
  resizeCanvases();
});

// Spectrogram hover → highlight phase in timeline
const spectrogramCanvas = document.getElementById('spectrogram');
spectrogramCanvas.addEventListener('mousemove', e => {
  const rect = spectrogramCanvas.getBoundingClientRect();
  const dpr = devicePixelRatio;
  const marginLeft = 35 * dpr;
  const cssMarginLeft = marginLeft / dpr;
  const cssX = e.clientX - rect.left - cssMarginLeft;
  const plotW = spectrogramCanvas.width - marginLeft;
  const pixelX = (cssX / (rect.width - cssMarginLeft)) * plotW;
  const phaseId = getPhaseAtX(pixelX);
  setHoveredPhase(phaseId);
});

spectrogramCanvas.addEventListener('mouseleave', () => {
  setHoveredPhase(null);
});

spectrogramCanvas.addEventListener('click', e => {
  const rect = spectrogramCanvas.getBoundingClientRect();
  const dpr = devicePixelRatio;
  const marginLeft = 35 * dpr;
  const cssMarginLeft = marginLeft / dpr;
  const cssX = e.clientX - rect.left - cssMarginLeft;
  const plotW = spectrogramCanvas.width - marginLeft;
  const pixelX = (cssX / (rect.width - cssMarginLeft)) * plotW;
  const phaseId = getPhaseAtX(pixelX);
  if (phaseId) jumpToPhase(phaseId, pixelX);
});

spectrogramCanvas.style.cursor = 'crosshair';

buildTimeline();

</script>
